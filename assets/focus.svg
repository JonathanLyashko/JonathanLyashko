<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="focusBg" x1="74" y1="66" x2="1130" y2="462" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09131F"/>
      <stop offset="1" stop-color="#0C1A2B"/>
    </linearGradient>
    <linearGradient id="focusAccent" x1="112" y1="112" x2="1089" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7BF6D2"/>
      <stop offset="0.55" stop-color="#8FA8FF"/>
      <stop offset="1" stop-color="#FFD36A"/>
    </linearGradient>
    <filter id="focusBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="24" fill="url(#focusBg)"/>
  <rect x="52" y="52" width="1096" height="416" rx="22" fill="#07121C" fill-opacity="0.58" stroke="url(#focusAccent)" stroke-opacity="0.42"/>
  <circle cx="108" cy="104" r="4" fill="#FF8A5B"/>
  <circle cx="128" cy="104" r="4" fill="#FFD36A"/>
  <circle cx="148" cy="104" r="4" fill="#7BF6D2"/>

  <text x="86" y="144" fill="#7BF6D2" font-family="'Segoe UI', sans-serif" font-size="14" letter-spacing="0.24em">ACTIVE THREADS</text>
  <text x="84" y="196" fill="#F7FBFF" font-family="'Segoe UI', sans-serif" font-size="42" font-weight="700">What I am building around right now</text>

  <g>
    <rect x="84" y="236" width="316" height="180" rx="22" fill="#0A1725" stroke="#214460"/>
    <text x="112" y="276" fill="#92ACCB" font-family="'Segoe UI', sans-serif" font-size="14" letter-spacing="0.18em">01 / ROBOTICS</text>
    <text x="112" y="324" fill="#F7FBFF" font-family="'Segoe UI', sans-serif" font-size="30" font-weight="600">Autonomous coordination</text>
    <text x="112" y="360" fill="#BDD0E7" font-family="'Segoe UI', sans-serif" font-size="19">Researching fleet behavior, control logic,</text>
    <text x="112" y="388" fill="#BDD0E7" font-family="'Segoe UI', sans-serif" font-size="19">and how multiple moving machines stop</text>
    <text x="112" y="416" fill="#BDD0E7" font-family="'Segoe UI', sans-serif" font-size="19">acting like multiple problems.</text>
  </g>

  <g>
    <rect x="442" y="236" width="316" height="180" rx="22" fill="#0A1725" stroke="#214460"/>
    <text x="470" y="276" fill="#92ACCB" font-family="'Segoe UI', sans-serif" font-size="14" letter-spacing="0.18em">02 / FPGA</text>
    <text x="470" y="324" fill="#F7FBFF" font-family="'Segoe UI', sans-serif" font-size="30" font-weight="600">Hardware that pulls its weight</text>
    <text x="470" y="360" fill="#BDD0E7" font-family="'Segoe UI', sans-serif" font-size="19">Leaning further into timing, logic, and</text>
    <text x="470" y="388" fill="#BDD0E7" font-family="'Segoe UI', sans-serif" font-size="19">design that makes the board feel like a</text>
    <text x="470" y="416" fill="#BDD0E7" font-family="'Segoe UI', sans-serif" font-size="19">first-class teammate.</text>
  </g>

  <g>
    <rect x="800" y="236" width="316" height="180" rx="22" fill="#0A1725" stroke="#214460"/>
    <text x="828" y="276" fill="#92ACCB" font-family="'Segoe UI', sans-serif" font-size="14" letter-spacing="0.18em">03 / SYSTEMS</text>
    <text x="828" y="324" fill="#F7FBFF" font-family="'Segoe UI', sans-serif" font-size="30" font-weight="600">Infrastructure with composure</text>
    <text x="828" y="360" fill="#BDD0E7" font-family="'Segoe UI', sans-serif" font-size="19">From Revvity AI infrastructure to the</text>
    <text x="828" y="388" fill="#BDD0E7" font-family="'Segoe UI', sans-serif" font-size="19">messy edges where software meets reality,</text>
    <text x="828" y="416" fill="#BDD0E7" font-family="'Segoe UI', sans-serif" font-size="19">I like systems that hold shape.</text>
  </g>

  <g opacity="0.35" filter="url(#focusBlur)">
    <rect x="801" y="248" width="296" height="156" rx="20" fill="#4FE3C1" fill-opacity="0.12">
      <animate attributeName="opacity" values="0.18;0.35;0.18" dur="5.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <path d="M130 454C262 441 346 436 474 448C573 457 675 465 796 448C898 433 976 410 1086 396" stroke="url(#focusAccent)" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round" stroke-dasharray="10 12">
    <animate attributeName="stroke-dashoffset" values="0;-132" dur="7s" repeatCount="indefinite"/>
  </path>
</svg>
