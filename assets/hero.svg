<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1100" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.45" stop-color="#0E2238"/>
      <stop offset="1" stop-color="#041018"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(942 151) rotate(123.249) scale(396.649 580.594)">
      <stop stop-color="#4FE3C1" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#4FE3C1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(294 584) rotate(-27.777) scale(502.812 402.87)">
      <stop stop-color="#FF8A5B" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#FF8A5B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelStroke" x1="156" y1="112" x2="1030" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7BF6D2"/>
      <stop offset="1" stop-color="#8DA8FF"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7BF6D2"/>
      <stop offset="1" stop-color="#FFD36A"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <pattern id="microGrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#8BA5C8" stroke-opacity="0.09"/>
    </pattern>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="720" rx="28" fill="url(#microGrid)"/>
  <ellipse cx="942" cy="151" rx="348" ry="258" fill="url(#glowA)"/>
  <ellipse cx="294" cy="584" rx="352" ry="206" fill="url(#glowB)"/>

  <g opacity="0.52">
    <path d="M84 560C252 503 356 502 467 534C584 568 723 644 1114 509" stroke="#4EDDBD" stroke-opacity="0.25" stroke-width="2"/>
    <path d="M86 581C240 536 377 550 501 597C616 641 760 674 1085 561" stroke="#FFD36A" stroke-opacity="0.18" stroke-width="2"/>
    <path d="M734 146C835 181 895 216 979 298" stroke="#9CB7FF" stroke-opacity="0.25" stroke-width="2"/>
  </g>

  <g opacity="0.9">
    <circle cx="984" cy="214" r="4" fill="#7BF6D2">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="920" cy="266" r="3" fill="#FFD36A">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="533" r="5" fill="#FF8A5B">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g opacity="0.7">
    <rect x="76" y="88" width="1048" height="544" rx="24" fill="#07131E" fill-opacity="0.42" stroke="url(#panelStroke)" stroke-opacity="0.48"/>
    <rect x="102" y="114" width="996" height="492" rx="18" fill="#08111E" fill-opacity="0.56" stroke="#A6BDE0" stroke-opacity="0.15"/>
  </g>

  <g opacity="0.42">
    <line x1="142" y1="176.5" x2="1056" y2="176.5" stroke="#A7BAD8" stroke-opacity="0.2"/>
    <line x1="142" y1="478.5" x2="1056" y2="478.5" stroke="#A7BAD8" stroke-opacity="0.2"/>
    <line x1="735.5" y1="176" x2="735.5" y2="606" stroke="#A7BAD8" stroke-opacity="0.14"/>
  </g>

  <g>
    <text x="146" y="146" fill="#7BF6D2" font-family="'Segoe UI', sans-serif" font-size="14" letter-spacing="0.22em">SYSTEM PROFILE / JONATHAN</text>
    <text x="144" y="286" fill="#F8FBFF" font-family="'Segoe UI', sans-serif" font-size="84" font-weight="700">Built for</text>
    <text x="144" y="370" fill="#F8FBFF" font-family="'Segoe UI', sans-serif" font-size="84" font-weight="700">complex machines.</text>
    <text x="146" y="430" fill="#AFC0DB" font-family="'Segoe UI', sans-serif" font-size="28">
      Computer engineer. Systems thinker. Playful operator.
    </text>
    <text x="146" y="470" fill="#AFC0DB" font-family="'Segoe UI', sans-serif" font-size="28">
      I make infrastructure, robots, and hardware-software boundaries behave.
    </text>
  </g>

  <g opacity="0.94">
    <rect x="145" y="524" width="164" height="52" rx="12" fill="#0D1C2C" stroke="#264966"/>
    <rect x="327" y="524" width="172" height="52" rx="12" fill="#0D1C2C" stroke="#264966"/>
    <rect x="517" y="524" width="164" height="52" rx="12" fill="#0D1C2C" stroke="#264966"/>
    <text x="173" y="556" fill="#F7FBFF" font-family="'Segoe UI', sans-serif" font-size="20">Robotics</text>
    <text x="355" y="556" fill="#F7FBFF" font-family="'Segoe UI', sans-serif" font-size="20">FPGA Work</text>
    <text x="553" y="556" fill="#F7FBFF" font-family="'Segoe UI', sans-serif" font-size="20">Infrastructure</text>
  </g>

  <g>
    <rect x="778" y="208" width="252" height="156" rx="18" fill="#0A1725" stroke="#1E3C54"/>
    <text x="804" y="242" fill="#91ABCB" font-family="'Segoe UI', sans-serif" font-size="14" letter-spacing="0.18em">CURRENT BEHAVIOR</text>
    <text x="804" y="290" fill="#F8FBFF" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="600">Noticeable energy.</text>
    <text x="804" y="327" fill="#B6C7DF" font-family="'Segoe UI', sans-serif" font-size="18">Low noise. High signal.</text>
    <text x="804" y="354" fill="#B6C7DF" font-family="'Segoe UI', sans-serif" font-size="18">A little wit. No template vibes.</text>
  </g>

  <g>
    <rect x="778" y="394" width="252" height="132" rx="18" fill="#0A1725" stroke="#1E3C54"/>
    <text x="804" y="428" fill="#91ABCB" font-family="'Segoe UI', sans-serif" font-size="14" letter-spacing="0.18em">PRIORITY STACK</text>
    <text x="804" y="473" fill="#F8FBFF" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="600">systems > slogans</text>
    <text x="804" y="506" fill="#B6C7DF" font-family="'Segoe UI', sans-serif" font-size="18">Engineer first. Hype much later.</text>
  </g>

  <g filter="url(#lineGlow)">
    <path d="M754 284H1036" stroke="url(#signal)" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="12 280;170 122;12 280" dur="4.8s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-120;-260" dur="4.8s" repeatCount="indefinite"/>
    </path>
    <path d="M754 462H1036" stroke="url(#signal)" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="18 260;150 128;18 260" dur="5.3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;-100;-220" dur="5.3s" repeatCount="indefinite"/>
    </path>
  </g>

  <g opacity="0.4" filter="url(#softBlur)">
    <rect x="760" y="191" width="290" height="352" rx="28" fill="#65DFCC" fill-opacity="0.08"/>
  </g>
